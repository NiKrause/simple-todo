name: Build & Deploy to Aleph IPFS

permissions:
  contents: read
  pull-requests: write
  statuses: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      relay_bootstrap_addr:
        description: >-
          Override relay bootstrap multiaddr(s) for production build.
          Comma-separated. Leave empty to use the default from .env.example.
        required: false
        default: ''
      domain:
        description: >-
          Aleph custom domain to link (e.g. simple-todo.le-space.de).
          Leave empty to skip domain linking.
        required: false
        default: ''

jobs:
  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.54.2-noble
    timeout-minutes: 15
    steps:
      - name: Checkout simple-todo
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run default database collaboration E2E
        id: default-database-e2e
        run: pnpm exec playwright test e2e/default-database-collaboration.spec.js --project=chromium

      - name: Summarize main E2E
        if: always()
        env:
          E2E_OUTCOME: ${{ steps.default-database-e2e.outcome }}
        run: |
          {
            echo '## main end-to-end test'
            echo
            echo "**Result:** ${E2E_OUTCOME}"
            echo
            echo 'The Chromium test starts a local OrbitDB relay and two isolated browser peers using the shared default todo database.'
            echo
            echo '| Coverage | CI behavior |'
            echo '| --- | --- |'
            echo '| Alice and Bob open the same default OrbitDB todo list | Runs |'
            echo '| Alice creates three todos and Bob creates three todos | Runs |'
            echo '| Both browsers must display all six replicated todos | Runs |'
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-deploy:
    needs: e2e
    runs-on: ubuntu-latest
    outputs:
      ipfs_cid_v0: ${{ steps.publish.outputs.ipfs_cid_v0 }}
      ipfs_cid_v1: ${{ steps.publish.outputs.ipfs_cid_v1 }}
      item_hash: ${{ steps.publish.outputs.item_hash }}
      url: ${{ steps.publish.outputs.url }}
    steps:
      - name: Checkout simple-todo
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_RELAY_BOOTSTRAP_ADDR_PROD: ${{ inputs.relay_bootstrap_addr || secrets.RELAY_BOOTSTRAP_ADDR_PROD || '' }}
          VITE_NODE_ENV: production
          VITE_APP_BRANCH: main
        run: pnpm build

      - name: Install isolated Aleph deploy tooling
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: npm install --prefix /tmp/le-space-deployer @le-space/node@0.6.11

      - name: Publish to Aleph IPFS
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: publish
        env:
          ALEPH_VM_MODE: site-publish
          ALEPH_SITE_DIRECTORY: ${{ github.workspace }}/build
          ALEPH_SITE_PIN: 'true'
          ALEPH_SITE_REF: simple-todo
          ALEPH_SITE_CHANNEL: ALEPH-CLOUDSOLUTIONS
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
        run: node --input-type=module -e "import('/tmp/le-space-deployer/node_modules/@le-space/node/index.js').then((m) => m.runSiteMode())"

  link-domain:
    needs: build-and-deploy
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.build-and-deploy.outputs.item_hash != ''
    runs-on: ubuntu-latest
    env:
      ALEPH_MAIN_SITE_DOMAIN: simple-todo.le-space.de
    steps:
      - name: Checkout simple-todo
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install isolated Aleph deploy tooling
        run: npm install --prefix /tmp/le-space-deployer @le-space/node@0.6.11

      - name: Link custom domain
        if: inputs.domain != '' || env.ALEPH_MAIN_SITE_DOMAIN != ''
        id: domain
        env:
          ALEPH_VM_MODE: site-domain-link
          ALEPH_SITE_ITEM_HASH: ${{ needs.build-and-deploy.outputs.item_hash }}
          ALEPH_SITE_DOMAIN: ${{ inputs.domain || env.ALEPH_MAIN_SITE_DOMAIN }}
          ALEPH_SITE_DOMAIN_CATCH_ALL_PATH: /index.html
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
        run: node --input-type=module -e "import('/tmp/le-space-deployer/node_modules/@le-space/node/index.js').then((m) => m.runSiteMode())"
