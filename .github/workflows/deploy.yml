name: Build & Deploy to Aleph IPFS

permissions:
  contents: read
  pull-requests: write
  statuses: write

on:
  push:
    branches: [collab01]
  workflow_dispatch:
    inputs:
      relay_bootstrap_addr:
        description: >-
          Override relay bootstrap multiaddr(s) for production build.
          Comma-separated. Leave empty to use the default from .env.example.
        required: false
        default: ''
      domain:
        description: >-
          Aleph custom domain to link (e.g. simple-todo.le-space.de).
          Leave empty to skip domain linking.
        required: false
        default: ''

jobs:
  e2e:
    if: github.ref_name == 'collab01'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.54.2-noble
    timeout-minutes: 15
    steps:
      - name: Checkout collab01
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run collaboration E2E
        id: collaboration-e2e
        run: pnpm exec playwright test e2e/collaboration.spec.js --project=chromium

      - name: Summarize collaboration E2E
        if: always()
        env:
          E2E_OUTCOME: ${{ steps.collaboration-e2e.outcome }}
        run: |
          {
            echo '## collab01 end-to-end tests'
            echo
            echo "**Result:** ${E2E_OUTCOME}"
            echo
            echo 'The Chromium suite starts a local OrbitDB relay and two isolated browser peers (Alice and Bob).'
            echo
            echo '| Coverage | CI behavior |'
            echo '| --- | --- |'
            echo '| WebRTC disabled: peers remain connected through circuit relay | Runs |'
            echo '| Alice and Bob receive distinct OrbitDB addresses and identities | Runs |'
            echo '| Bob opens Alice’s database and replicates a todo to Alice | Runs |'
            echo '| Alice opens Bob’s database and replicates a todo to Bob | Runs |'
            echo '| Late peer reads a todo previously replicated by the relay, in both directions | Opt-in with `E2E_RELAY_PINNING_PROOF=true` |'
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-deploy:
    if: github.ref_name == 'collab01'
    needs: e2e
    runs-on: ubuntu-latest
    outputs:
      ipfs_cid: ${{ steps.publish.outputs.ipfs_cid }}
      ipfs_cid_v0: ${{ steps.publish.outputs.ipfs_cid_v0 }}
      ipfs_cid_v1: ${{ steps.publish.outputs.ipfs_cid_v1 }}
      item_hash: ${{ steps.publish.outputs.item_hash }}
      store_status: ${{ steps.publish.outputs.store_status }}
      store_processed: ${{ steps.publish.outputs.store_processed }}
      url: ${{ steps.publish.outputs.url }}
    steps:
      - name: Checkout collab01
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_RELAY_BOOTSTRAP_ADDR_PROD: ${{ inputs.relay_bootstrap_addr || secrets.RELAY_BOOTSTRAP_ADDR_PROD || '' }}
          VITE_NODE_ENV: production
          VITE_APP_BRANCH: collab01
        run: pnpm build

      - name: Install isolated Aleph deploy tooling
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: npm install --prefix /tmp/le-space-deployer @le-space/node@0.6.22

      - name: Publish to Aleph IPFS
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: publish
        env:
          ALEPH_VM_MODE: site-publish
          ALEPH_SITE_DIRECTORY: ${{ github.workspace }}/build
          ALEPH_SITE_PIN: 'true'
          ALEPH_SITE_NAME: simple-todo-collab01
          ALEPH_SITE_CHANNEL: ALEPH-CLOUDSOLUTIONS
          ALEPH_SITE_PUBLISH_ATTEMPTS: '3'
          ALEPH_SITE_PUBLISH_RETRY_DELAY_MS: '15000'
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
        run: node scripts/run-aleph-site-publish-with-retry.mjs

  link-domain:
    needs: build-and-deploy
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.build-and-deploy.outputs.item_hash != '' &&
      needs.build-and-deploy.outputs.store_processed == 'true'
    runs-on: ubuntu-latest
    env:
      ALEPH_COLLAB01_SITE_DOMAIN: collab01.le-space.de
    steps:
      - name: Checkout collab01
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install isolated Aleph deploy tooling
        run: npm install --prefix /tmp/le-space-deployer @le-space/node@0.6.22

      - name: Link custom domain
        if: inputs.domain != '' || env.ALEPH_COLLAB01_SITE_DOMAIN != ''
        id: domain
        env:
          ALEPH_VM_MODE: site-domain-link
          ALEPH_SITE_ITEM_HASH: ${{ needs.build-and-deploy.outputs.item_hash }}
          ALEPH_SITE_IPFS_CID: ${{ needs.build-and-deploy.outputs.ipfs_cid }}
          ALEPH_SITE_IPFS_CID_V0: ${{ needs.build-and-deploy.outputs.ipfs_cid_v0 }}
          ALEPH_SITE_DOMAIN: ${{ inputs.domain || env.ALEPH_COLLAB01_SITE_DOMAIN }}
          ALEPH_SITE_DOMAIN_CATCH_ALL_PATH: /index.html
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
        run: node --input-type=module -e "import('/tmp/le-space-deployer/node_modules/@le-space/node/index.js').then((m) => m.runSiteMode())"
